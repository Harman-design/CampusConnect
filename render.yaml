services:
  - type: web
    name: campusconnect-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    region: singapore
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CLIENT_URL
        sync: false # set to your deployed Vercel URL, e.g. https://campusconnect.vercel.app
      - key: MONGO_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: RESET_TOKEN_EXPIRES_MIN
        value: 30
      - key: COOKIE_SECURE
        value: true
      - key: COOKIE_SAME_SITE
        value: none # required for a cross-origin Vercel frontend + Render backend
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: AUTH_RATE_LIMIT_WINDOW_MIN
        value: 15
      - key: AUTH_RATE_LIMIT_MAX
        value: 20
      - key: AI_RATE_LIMIT_WINDOW_MIN
        value: 15
      - key: AI_RATE_LIMIT_MAX
        value: 30
