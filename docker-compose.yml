version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campusconnect-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://db:27017/campusconnect
      - CLIENT_URL=http://localhost:5173
      - COOKIE_SECURE=false # Set to true when running behind HTTPS proxy
      - COOKIE_SAME_SITE=lax
    depends_on:
      - db

  db:
    image: mongo:6.0-jammy
    container_name: campusconnect-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
    driver: local
