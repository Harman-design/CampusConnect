name: campusconnect_flutter
description: A responsive, cross-platform MERN client for CampusConnect.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  provider: ^6.0.5
  shared_preferences: ^2.2.0
  google_fonts: ^6.1.0
  flutter_markdown: ^0.6.18
  fl_chart: ^0.65.0
  file_picker: ^6.1.1
  share_plus: ^7.2.1
  url_launcher: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
